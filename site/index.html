  <title>Mohamed N. Gaafar — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --text: #e6edf3;
      --text-muted: #8b949e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid var(--border);
      margin: 0 auto 1.5rem;
      display: block;
      background: var(--border);
      object-fit: cover;
    }

    .badge {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .social-links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      padding: 0.45rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .social-links a:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.06);
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
  </style>
</head>
